<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>管理后台 · 票务担保平台</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
<style>
.fa-shield-alt::before{content:"🛡"}.fa-search::before{content:"🔍"}.fa-check-circle::before{content:"✅"}
.fa-users::before{content:"👥"}.fa-bolt::before{content:"⚡"}.fa-ticket-alt::before{content:"🎫"}
.fa-shopping-bag::before{content:"🛍"}.fa-user::before{content:"👤"}.fa-plus::before{content:"＋"}
.fa-times::before{content:"✕"}.fa-sync::before{content:"↻"}.fa-check::before{content:"✓"}
.fa-trash::before{content:"🗑"}.fa-chevron-down::before{content:"▾"}.fa-clock::before{content:"⏰"}
.fa-chart-bar::before{content:"📊"}.fa-calendar-alt::before{content:"📅"}.fa-sign-out-alt::before{content:"→"}
.fa-user-circle::before{content:"👤"}.fa-plus-circle::before{content:"➕"}.fa-list::before{content:"≡"}
.fa-exclamation-circle::before{content:"⚠"}.fa-university::before{content:"🏦"}.fa-credit-card::before{content:"💳"}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0f;
  --surface:#16161a;
  --surface2:#1e1e24;
  --surface3:#26262e;
  --border:rgba(255,255,255,0.07);
  --border-md:rgba(255,255,255,0.13);
  --text:#f0ede8;
  --text2:#9e9a94;
  --text3:#585550;
  --gold:#d4a847;--gold2:#b8902e;--gold-bg:rgba(212,168,71,0.1);--gold-border:rgba(212,168,71,0.25);
  --red:#e8304a;--red-bg:rgba(232,48,74,0.1);--red-border:rgba(232,48,74,0.3);
  --green:#3dba6f;--green-bg:rgba(61,186,111,0.1);--green-border:rgba(61,186,111,0.25);
  --orange:#f07730;--orange-bg:rgba(240,119,48,0.1);
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --font:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
body{font-family:var(--font);background:var(--ink);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--ink)}
.login-card{background:var(--surface2);border:0.5px solid var(--border-md);border-radius:var(--r-xl);padding:32px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.login-mark{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-mark svg{width:18px;height:18px;fill:var(--ink)}
.login-logo span{font-size:15px;font-weight:700}
.login-logo em{color:var(--gold);font-style:normal}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border-md);border-radius:var(--r-md);font-size:14px;background:var(--surface3);color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,71,0.1)}
.form-textarea{resize:vertical;min-height:70px}
.btn-login{width:100%;padding:12px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.btn-login:hover{background:var(--gold2)}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none}
.login-err.show{display:block}

/* ── ADMIN SHELL ── */
.admin{display:none}
.admin.show{display:block}
.admin-nav{background:var(--surface2);border-bottom:0.5px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.admin-logo{display:flex;align-items:center;gap:9px}
.admin-logo-mark{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center}
.admin-logo-mark svg{width:14px;height:14px;fill:var(--ink)}
.admin-logo-name{font-size:14px;font-weight:700}
.admin-logo-name em{color:var(--gold);font-style:normal}
.admin-logo-badge{background:var(--surface3);border:0.5px solid var(--border-md);color:var(--text2);font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:6px}
.admin-nav-right{display:flex;align-items:center;gap:10px}
.admin-nav-user{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.admin-nav-user i{color:var(--gold)}
.btn-logout{padding:5px 12px;border:0.5px solid var(--red-border);border-radius:var(--r-sm);background:transparent;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--red);transition:all .15s}
.btn-logout:hover{background:var(--red-bg)}

/* ── TABS ── */
.admin-tabs{display:flex;border-bottom:0.5px solid var(--border);padding:0 20px;background:var(--surface);overflow-x:auto;scrollbar-width:none}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:color .15s}
.admin-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.admin-tab:hover{color:var(--text)}
.admin-content{padding:20px;max-width:1400px;margin:0 auto}
.admin-page{display:none}
.admin-page.active{display:block}
.badge-count{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.stat-box{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:0.4}
.stat-num{font-size:28px;font-weight:700;color:var(--gold);font-family:var(--mono)}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:600}
.stat-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:24px;opacity:0.07}

/* ── DATA CARD ── */
.data-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.data-card-header{padding:13px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.data-card-title{font-size:13px;font-weight:700}
.data-card-actions{display:flex;align-items:center;gap:8px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
th{padding:9px 12px;text-align:left;font-weight:700;color:var(--text2);background:var(--surface3);border-bottom:0.5px solid var(--border);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:0.3px}
td{padding:10px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;white-space:nowrap}
.pill-pending{background:var(--orange-bg);color:var(--orange)}
.pill-live{background:var(--green-bg);color:var(--green)}
.pill-sold{background:var(--surface3);color:var(--text3)}
.pill-rejected{background:var(--red-bg);color:var(--red)}
.txid-cell{font-family:var(--mono);font-size:11px;color:var(--text2)}

/* ── ACTION BUTTONS ── */
.btn-approve{padding:4px 10px;background:var(--green-bg);color:var(--green);border:0.5px solid var(--green-border);border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-approve:hover{background:var(--green);color:#fff}
.btn-reject{padding:4px 10px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border);border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);margin-left:4px;transition:all .15s}
.btn-reject:hover{background:var(--red);color:#fff}
.btn-remove{padding:4px 10px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border);border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-remove:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 11px;border:0.5px solid var(--border-md);border-radius:var(--r-sm);background:transparent;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s}
.btn-sm:hover{background:var(--surface3);color:var(--text)}
.btn-gold{background:var(--gold);color:var(--ink);border:none;font-weight:700;border-radius:var(--r-md)}
.btn-gold:hover{background:var(--gold2)}
.btn-icon{width:28px;height:28px;border-radius:var(--r-sm);border:0.5px solid var(--border-md);background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.btn-icon:hover{background:var(--surface3);color:var(--text)}
.btn-icon.danger:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.empty i{font-size:28px;margin-bottom:10px;display:block}

/* ── SHOWS MANAGEMENT ── */
.show-form-card{background:var(--surface3);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px}
.show-form-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-group{margin-bottom:10px}
.form-group:last-child{margin-bottom:0}
.tags-input-wrap{border:0.5px solid var(--border-md);border-radius:var(--r-md);padding:6px 10px;background:var(--surface3);cursor:text;min-height:42px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tags-input-wrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,71,0.1)}
.date-tag{background:var(--gold-bg);border:0.5px solid var(--gold-border);color:var(--gold);font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;display:flex;align-items:center;gap:4px;font-family:var(--mono)}
.date-tag button{background:none;border:none;cursor:pointer;color:var(--gold);font-size:12px;line-height:1;padding:0;display:flex;align-items:center}
.tags-input-wrap input{border:none;background:none;outline:none;font-size:13px;color:var(--text);font-family:var(--font);min-width:100px;flex:1}
.prices-input{width:100%}
.show-list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:14px}
.show-list-card{background:var(--surface3);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px;position:relative;transition:border-color .15s}
.show-list-card:hover{border-color:var(--gold-border)}
.slc-artist{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:4px}
.slc-title{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.4}
.slc-meta{font-size:11px;color:var(--text2);line-height:1.7}
.slc-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.slc-status{position:absolute;top:12px;right:12px}
.toggle-switch{position:relative;width:36px;height:20px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--surface2);border-radius:10px;transition:.2s;border:0.5px solid var(--border-md)}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:2px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--green-bg);border-color:var(--green-border)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px);background:var(--green)}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:var(--surface2);border:0.5px solid var(--border-md);border-radius:var(--r-xl);padding:24px;width:100%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-close{position:absolute;top:14px;right:16px;background:var(--surface3);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;color:var(--text2);font-size:12px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text)}
.btn-submit{width:100%;padding:12px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r-lg);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s;margin-top:4px}
.btn-submit:hover{background:var(--gold2)}

/* ORDER STATUS SELECT */
.status-sel{padding:4px 7px;border-radius:var(--r-sm);border:0.5px solid var(--border-md);font-size:11px;cursor:pointer;background:var(--surface3);color:var(--text);font-family:var(--font)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-mark"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H7v-2h4v2zm0-4H7v-2h4v2zm6 4h-4v-2h4v2zm0-4h-4v-2h4v2z"/></svg></div>
      <span>票务<em>助手</em>交易平台</span>
    </div>
    <div class="login-title">管理后台</div>
    <div class="login-sub">仅限平台管理员访问</div>
    <div class="form-group">
      <label class="form-label">管理员账号</label>
      <input class="form-input" id="admin-account" placeholder="请输入管理员账号" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" id="admin-pass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    </div>
    <div class="login-err" id="admin-err"><i class="fa fa-exclamation-circle"></i> 账号或密码错误</div>
    <button class="btn-login" onclick="doAdminLogin()" style="margin-top:10px">登录后台</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin-page">
  <nav class="admin-nav">
    <div class="admin-logo">
      <div class="admin-logo-mark"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 12H7v-2h4v2zm0-4H7v-2h4v2zm6 4h-4v-2h4v2zm0-4h-4v-2h4v2z"/></svg></div>
      <span class="admin-logo-name">票务<em>助手</em></span>
      <span class="admin-logo-badge">管理后台</span>
    </div>
    <div class="admin-nav-right">
      <span class="admin-nav-user"><i class="fa fa-user-circle"></i><span id="admin-nav-user"></span></span>
      <button class="btn-logout" onclick="doAdminLogout()"><i class="fa fa-sign-out-alt"></i> 退出</button>
    </div>
  </nav>
  <div class="admin-tabs">
    <div class="admin-tab active" id="atab-overview" onclick="switchAdminTab('overview')"><i class="fa fa-chart-bar"></i>概览</div>
    <div class="admin-tab" id="atab-shows" onclick="switchAdminTab('shows')"><i class="fa fa-calendar-alt"></i>演出管理</div>
    <div class="admin-tab" id="atab-listings" onclick="switchAdminTab('listings')"><i class="fa fa-ticket-alt"></i>上架审核 <span class="badge-count" id="pending-count" style="display:none">0</span></div>
    <div class="admin-tab" id="atab-orders" onclick="switchAdminTab('orders')"><i class="fa fa-shopping-bag"></i>订单管理</div>
    <div class="admin-tab" id="atab-users" onclick="switchAdminTab('users')"><i class="fa fa-users"></i>用户管理</div>
  </div>
  <div class="admin-content">

    <!-- OVERVIEW -->
    <div class="admin-page active" id="apage-overview">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="s-total-users">-</div><div class="stat-label">总用户数</div><i class="fa fa-users stat-icon"></i></div>
        <div class="stat-box"><div class="stat-num" id="s-pending">-</div><div class="stat-label">待审核上架</div><i class="fa fa-clock stat-icon"></i></div>
        <div class="stat-box"><div class="stat-num" id="s-live">-</div><div class="stat-label">上架中</div><i class="fa fa-ticket-alt stat-icon"></i></div>
        <div class="stat-box"><div class="stat-num" id="s-total-orders">-</div><div class="stat-label">总订单数</div><i class="fa fa-shopping-bag stat-icon"></i></div>
      </div>
      <div class="data-card">
        <div class="data-card-header">
          <div class="data-card-title"><i class="fa fa-clock" style="color:var(--orange);margin-right:6px"></i>待审核上架票</div>
          <button class="btn-sm" onclick="loadAll()"><i class="fa fa-sync"></i> 刷新</button>
        </div>
        <div class="table-wrap"><div id="overview-pending"></div></div>
      </div>
    </div>

    <!-- SHOWS MANAGEMENT -->
    <div class="admin-page" id="apage-shows">
      <div class="data-card">
        <div class="data-card-header">
          <div class="data-card-title"><i class="fa fa-plus-circle" style="color:var(--gold);margin-right:6px"></i>新增演出场次</div>
        </div>
        <div style="padding:16px">
          <div class="show-form-card">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">艺人名称</label>
                <input class="form-input" id="ns-artist" placeholder="例：周杰伦"/>
              </div>
              <div class="form-group">
                <label class="form-label">演出城市</label>
                <input class="form-input" id="ns-city" placeholder="例：北京"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">演出全称</label>
              <input class="form-input" id="ns-title" placeholder="例：嘉年华II世界巡回演唱会 北京站"/>
            </div>
            <div class="form-group">
              <label class="form-label">场次简称（前台选项用）</label>
              <input class="form-input" id="ns-label" placeholder="例：嘉年华II 北京站"/>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">演出类型</label>
                <select class="form-select" id="ns-type">
                  <option value="concert">演唱会</option>
                  <option value="talk">脱口秀</option>
                  <option value="musical">音乐剧</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">场馆</label>
                <input class="form-input" id="ns-venue" placeholder="例：国家体育场（鸟巢）"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">演出日期（输入日期回车添加，格式 YYYY-MM-DD）</label>
              <div class="tags-input-wrap" id="ns-dates-wrap" onclick="document.getElementById('ns-date-input').focus()">
                <div id="ns-dates-tags"></div>
                <input id="ns-date-input" placeholder="2026-04-17 回车添加" onkeydown="addDateTag(event)"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">面价列表（逗号分隔，例：480,680,980,1280）</label>
              <input class="form-input" id="ns-prices" placeholder="480,680,980,1280,1580"/>
            </div>
            <div class="form-group">
              <label class="form-label">演出海报图片（选填）</label>
              <div style="display:flex;align-items:center;gap:10px">
                <input class="form-input" id="ns-poster-url" placeholder="直接填图片URL，或点击上传"/>
                <label style="cursor:pointer;background:var(--surface3);border:0.5px solid var(--border-md);border-radius:var(--r-md);padding:8px 12px;font-size:12px;color:var(--text2);white-space:nowrap">

let newShowDates=[];
function previewPosterUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('ns-poster-img').src=e.target.result;
    document.getElementById('ns-poster-preview').style.display='flex';
    document.getElementById('ns-poster-preview').style.alignItems='center';
    document.getElementById('ns-poster-status').textContent='✓ '+file.name;
  };
  reader.readAsDataURL(file);
}
function addDateTag(e){
  if(e.key!=='Enter'&&e.key!==','&&e.key!=='，')return;
  e.preventDefault();
  const val=e.target.value.trim().replace(/，/g,'');
  if(!val)return;
  if(/^\d{4}-\d{2}-\d{2}$/.test(val)&&!newShowDates.includes(val)){
    newShowDates.push(val);
    renderDateTags();
  }else if(val){
    e.target.style.borderBottom='1px solid var(--red)';
    setTimeout(()=>e.target.style.borderBottom='',1000);
  }
  e.target.value='';
}
function renderDateTags(){
  const wrap=document.getElementById('ns-dates-tags');
  wrap.innerHTML=newShowDates.map((d,i)=>`
    <span class="date-tag">${d}<button type="button" onclick="removeDate(${i})">×</button></span>
  `).join('');
}
function removeDate(i){newShowDates.splice(i,1);renderDateTags()}

    const fname=`poster_${Date.now()}.${posterFile.name.split('.').pop()}`;

    if(!upErr)posterUrl=`${SB_URL}/storage/v1/object/public/payments/${fname}`;
  }
  const{error}=await sb.from('shows').insert({

      alert('⚠️ 数据库中尚未创建 shows 表。\n\n请在 Supabase 中执行以下 SQL：\n\nCREATE TABLE shows (\n  id bigint generated always as identity primary key,\n  artist text,\n  city text,\n  title text,\n  label text,\n  type text default \'concert\',\n  venue text,\n  date text,\n  dates jsonb default \'[]\',\n  orig_prices jsonb default \'[]\',\n  hot boolean default false,\n  active boolean default true,\n  created_at timestamptz default now()\n);');
    }else{
      alert('添加失败：'+error.message);
    }
    return;
  }
  // reset form
  document.getElementById('ns-artist').value='';
  document.getElementById('ns-city').value='';
  document.getElementById('ns-title').value='';
  document.getElementById('ns-label').value='';
  document.getElementById('ns-venue').value='';
  document.getElementById('ns-prices').value='';
  document.getElementById('ns-poster-url').value='';

    sb.from('users').select('id,name,account')
  ]);
  const el=document.getElementById('admin-listings');
  if(!listings||!listings.length){el.innerHTML='<div class="empty"><i class="fa fa-ticket-alt"></i>暂无记录</div>';return}
  el.innerHTML=renderListingsTable(listings,users||[],false);
}
function renderListingsTable(listings,users,pendingOnly){
  const userMap={};users.forEach(u=>{userMap[u.id]=u});
  return`<table>
    <thead><tr>
      <th>ID</th><th>卖家</th><th>艺人</th><th>演出</th><th>日期</th><th>城市</th><th>张数</th><th>价格</th><th>类型</th><th>流水号</th><th>状态</th><th>时间</th><th>操作</th>
    </tr></thead>
    <tbody>${listings.map(l=>{
      const u=userMap[l.user_id];
      const sm={pending:'pill-pending',live:'pill-live',sold:'pill-sold',rejected:'pill-rejected'};
      const st={pending:'待审核',live:'已上架',sold:'已售出',rejected:'已拒绝'};
      const actions=l.status==='pending'
        ?`<button class="btn-approve" onclick="approveListing(${l.id})"><i class="fa fa-check"></i> 通过</button><button class="btn-reject" onclick="rejectListing(${l.id})"><i class="fa fa-times"></i> 拒绝</button>`
        :l.status==='live'?`<button class="btn-remove" onclick="removeListing(${l.id})">下架</button>`:'-';
      return`<tr>
        <td style="color:var(--text3);font-family:var(--mono)">${l.id}</td>
        <td><div style="font-weight:700;font-size:12px">${u?u.name:'-'}</div><div style="color:var(--text2);font-size:11px;font-family:var(--mono)">${u?u.account:l.user_id}</div></td>
        <td>${l.artist}</td>
        <td style="max-width:160px;white-space:normal;font-size:12px">${l.title}</td>
        <td style="white-space:nowrap;font-family:var(--mono);font-size:11px">${l.date}</td>
        <td>${l.city}</td>
        <td>${l.qty}张</td>
        <td style="color:var(--gold);font-weight:700;font-family:var(--mono)">¥${Number(l.price).toLocaleString()}</td>
        <td style="font-size:11px">${l.ticket_type||'-'}</td>
        <td class="txid-cell">${l.txid||'-'}</td>
        <td><span class="pill ${sm[l.status]||'pill-pending'}">${st[l.status]||l.status}</span></td>
        <td style="white-space:nowrap;color:var(--text3);font-size:11px;font-family:var(--mono)">${new Date(l.created_at).toLocaleString('zh-CN')}</td>
        <td style="white-space:nowrap">${actions}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
async function approveListing(id){await sb.from('listings').update({status:'live'}).eq('id',id);loadAll();loadListings()}
async function rejectListing(id){await sb.from('listings').update({status:'rejected'}).eq('id',id);loadAll();loadListings()}
async function removeListing(id){
  if(!confirm('确认下架这张票？'))return;
  await sb.from('listings').update({status:'rejected'}).eq('id',id);
  loadListings();
}

// ── ORDERS ──
async function loadOrders(){

    sb.from('orders').select('*').order('created_at',{ascending:false}),

  ]);

  if(!orders||!orders.length){el.innerHTML='<div class="empty"><i class="fa fa-shopping-bag"></i>暂无订单</div>';return}
  const userMap={};users.forEach(u=>{userMap[u.id]=u});
  const sm={'待审核':'pill-pending','待发票':'pill-pending','已发票':'pill-live','已完成':'pill-sold','已拒绝':'pill-rejected'};
  el.innerHTML=`<table>
    <thead><tr><th>订单ID</th><th>买家</th><th>艺人</th><th>演出</th><th>日期</th><th>张数</th><th>总价</th><th>流水号</th><th>截图</th><th>付款状态</th><th>订单状态</th><th>时间</th><th>操作</th></tr></thead>
    <tbody>${orders.map(o=>{
      const u=userMap[o.user_id];
      return`<tr>
        <td style="font-family:var(--mono);color:var(--gold);font-size:11px">TJ${o.id}</td>
        <td><div style="font-weight:700;font-size:12px">${u?u.name:'-'}</div><div style="color:var(--text2);font-size:11px;font-family:var(--mono)">${u?u.account:o.user_id}</div></td>
        <td>${o.artist}</td>
        <td style="max-width:140px;white-space:normal;font-size:11px">${o.title}</td>
        <td style="white-space:nowrap;font-family:var(--mono);font-size:11px">${o.date}</td>
        <td>${o.qty}张</td>
        <td style="color:var(--gold);font-weight:700;font-family:var(--mono)">¥${Number(o.total).toLocaleString()}</td>
        <td class="txid-cell">${o.pay_txid||'-'}</td>
        <td>${o.pay_screenshot?`<a href="${o.pay_screenshot}" target="_blank" style="color:var(--gold);font-size:11px;font-weight:700"><i class="fa fa-image"></i> 查看</a>`:'<span style="color:var(--text3)">未传</span>'}</td>
        <td><span class="pill ${sm[o.pay_status||'待审核']||'pill-pending'}">${o.pay_status||'待审核'}</span></td>
        <td><span class="pill ${sm[o.status]||'pill-pending'}">${o.status}</span></td>
        <td style="white-space:nowrap;color:var(--text3);font-size:11px;font-family:var(--mono)">${new Date(o.created_at).toLocaleString('zh-CN')}</td>
        <td style="white-space:nowrap;min-width:160px">
          ${(o.pay_status==='待审核')?`<button class="btn-approve" onclick="approveOrder(${o.id})" style="margin-bottom:4px"><i class="fa fa-check"></i> 通过</button><button class="btn-reject" onclick="rejectOrder(${o.id})" style="margin-bottom:4px"><i class="fa fa-times"></i> 拒绝</button>`:''}<br>
          <select class="status-sel" onchange="updateOrderStatus(${o.id},this.value)">
            <option ${o.status==='待审核'?'selected':''}>待审核</option>
            <option ${o.status==='待发票'?'selected':''}>待发票</option>
            <option ${o.status==='已发票'?'selected':''}>已发票</option>

async function approveOrder(id){await sb.from('orders').update({pay_status:'已通过',status:'待发票'}).eq('id',id);loadOrders()}
async function rejectOrder(id){await sb.from('orders').update({pay_status:'已拒绝',status:'已拒绝'}).eq('id',id);loadOrders()}
async function updateOrderStatus(id,status){await sb.from('orders').update({status}).eq('id',id)}

// ── USERS ──
async function loadUsers(){
  const[{data:users},{data:listings},{data:orders},{data:cards},{data:certs}]=await Promise.all([
    sb.from('users').select('*').order('created_at',{ascending:false}),
    sb.from('listings').select('user_id,status,cert_url'),
    sb.from('orders').select('user_id'),
    sb.from('bank_cards').select('user_id,bank_name,card_no,holder_name'),
    sb.from('listings').select('user_id,cert_url').not('cert_url','is',null).neq('cert_url','')
  ]);
  const el=document.getElementById('admin-users');
  if(!users||!users.length){el.innerHTML='<div class="empty"><i class="fa fa-users"></i>暂无用户</div>';return}
  el.innerHTML=`<table>
    <thead><tr>
      <th>ID</th><th>昵称</th><th>账号</th>
      <th>余额</th><th>绑定银行卡</th><th>演出许可证</th>
      <th>出票中</th><th>订单数</th><th>注册时间</th><th>操作</th>
    </tr></thead>
    <tbody>${users.map(u=>{
      const uListings=(listings||[]).filter(l=>l.user_id===u.id&&l.status==='live').length;
      const uOrders=(orders||[]).filter(o=>o.user_id===u.id).length;
      const uCards=(cards||[]).filter(c=>c.user_id===u.id);
      const cardHtml=uCards.length?uCards.map(c=>`<div style="font-size:11px;font-family:var(--mono);color:var(--text2)">${c.bank_name} ${c.card_no.slice(-4).padStart(c.card_no.length,'*')} <span style="color:var(--text3)">${c.holder_name}</span></div>`).join(''):'<span style="color:var(--text3);font-size:11px">未绑定</span>';
      const uCerts=(certs||[]).filter(c=>c.user_id===u.id&&c.cert_url);
      const certHtml=uCerts.length?`<a href="${uCerts[0].cert_url}" target="_blank" style="color:var(--gold);font-size:11px;text-decoration:none">📋 查看证件</a>`:'<span style="color:var(--text3);font-size:11px">未提交</span>';
      const bal=u.balance||0;
      const frozen=u.balance_frozen||0;
      return`<tr>
        <td style="color:var(--text3);font-family:var(--mono);font-size:11px">${u.id}</td>
        <td><strong>${u.name}</strong></td>
        <td style="font-family:var(--mono);font-size:12px">${u.account}</td>
        <td style="font-size:12px">
          <span style="color:var(--gold);font-weight:700">¥${bal.toFixed(2)}</span>
          ${frozen>0?`<br><span style="font-size:10px;color:var(--text3)">冻结¥${frozen.toFixed(2)}</span>`:''}
        </td>
        <td>${cardHtml}</td>
        <td>${certHtml}</td>
        <td><span style="color:var(--gold);font-weight:700">${uListings}</span></td>
        <td>${uOrders}</td>
        <td style="color:var(--text3);font-size:11px;font-family:var(--mono)">${new Date(u.created_at).toLocaleString('zh-CN')}</td>
        <td style="white-space:nowrap">
          <button class="btn-sm" onclick="openUserDetail(${u.id})" style="font-size:11px;margin-bottom:4px;width:100%"><i class="fa fa-eye"></i> 详情</button>
          <button class="btn-sm danger" onclick="removeUser(${u.id},'${u.name}')" style="background:rgba(220,50,50,0.1);color:#e55;border-color:rgba(220,50,50,0.3);font-size:11px;width:100%"><i class="fa fa-user-times"></i> 移除</button>
        </td>
      </tr>`;
    }).join('')}</tbody></table>`;
}
async function openUserDetail(uid){
  // 并发查用户信息、上架记录、购票订单、银行卡、实名证件
  const[{data:u},{data:listings},{data:orders},{data:cards}]=await Promise.all([
    sb.from('users').select('*').eq('id',uid).single(),
    sb.from('listings').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    sb.from('orders').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
    sb.from('bank_cards').select('*').eq('user_id',uid)
  ]);
  if(!u){alert('用户不存在');return}
  const modal=document.getElementById('user-detail-overlay');
  // 基本信息
  document.getElementById('ud-name').textContent=u.name;
  document.getElementById('ud-account').textContent=u.account;
  document.getElementById('ud-id').textContent='ID: '+u.id;
  document.getElementById('ud-reg').textContent='注册：'+new Date(u.created_at).toLocaleString('zh-CN');
  document.getElementById('ud-balance').textContent='¥'+(u.balance||0).toFixed(2);
  document.getElementById('ud-frozen').textContent='¥'+(u.balance_frozen||0).toFixed(2);
  // 银行卡
  const cardEl=document.getElementById('ud-cards');
  cardEl.innerHTML=cards&&cards.length?cards.map(c=>`<div style="font-size:12px;padding:6px 0;border-bottom:0.5px solid var(--border)"><span style="color:var(--text2)">${c.bank_name}</span> <span style="font-family:var(--mono)">${c.card_no}</span> <span style="color:var(--text3)">${c.holder_name}</span></div>`).join(''):'<span style="color:var(--text3);font-size:12px">未绑定银行卡</span>';
  // 上架记录
  const listEl=document.getElementById('ud-listings');
  listEl.innerHTML=listings&&listings.length?listings.map(l=>{
    const certBtn=l.cert_url?`<a href="${l.cert_url}" target="_blank" style="color:var(--gold);font-size:11px;margin-left:6px">📋证件</a>`:'';
    const idInfo=l.seller_name?`<span style="color:var(--text3);font-size:11px"> | ${l.seller_name} ${l.seller_idcard?l.seller_idcard.slice(0,6)+'****'+l.seller_idcard.slice(14):''}</span>`:'';
    const statusColor={'live':'var(--green)','pending':'var(--gold)','sold':'var(--text3)'}[l.status]||'var(--text2)';
    return`<div style="padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <strong>${l.artist}</strong> ${l.title||''}
          <span style="color:${statusColor};margin-left:6px;font-size:11px">[${l.status}]</span>${certBtn}
        </div>
        <span style="color:var(--gold);font-weight:700;white-space:nowrap">¥${(l.price||0).toLocaleString()}</span>
      </div>
      <div style="color:var(--text3);margin-top:2px">${l.date||''} · ${l.city||''} · ${l.ticket_type||''} · ${l.qty||1}张${idInfo}</div>
    </div>`;
  }).join(''):'<span style="color:var(--text3);font-size:12px">暂无上架记录</span>';
  // 购票订单
  const orderEl=document.getElementById('ud-orders');
  orderEl.innerHTML=orders&&orders.length?orders.map(o=>{
    const statusColor={'已完成':'var(--green)','待审核':'var(--gold)','已取消':'var(--text3)'}[o.status]||'var(--text2)';
    return`<div style="padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <strong>${o.artist||''}</strong> ${o.title||''}
          <span style="color:${statusColor};margin-left:6px;font-size:11px">[${o.status||''}]</span>
        </div>
        <span style="color:var(--gold);font-weight:700;white-space:nowrap">¥${(o.total||0).toLocaleString()}</span>
      </div>
      <div style="color:var(--text3);margin-top:2px">${o.date||''} · ${o.city||''} · ${o.qty||1}张 · 订单#TJ${o.id}</div>
    </div>`;
  }).join(''):'<span style="color:var(--text3);font-size:12px">暂无购票记录</span>';
  modal.style.display='block';
}
function closeUserDetail(){
  document.getElementById('user-detail-overlay').style.display='none';
}
async function removeUser(id,name){
  if(!confirm('确认移除用户「'+name+'」？\n将同时清除该用户的上架记录、订单和银行卡信息'))return;
  // 按外键依赖顺序依次删除关联数据
  await sb.from('bank_cards').delete().eq('user_id',id);
  await sb.from('withdrawals').delete().eq('user_id',id);
  await sb.from('listings').delete().eq('user_id',id);
  await sb.from('orders').delete().eq('user_id',id);
  // 最后删用户
  const{error}=await sb.from('users').delete().eq('id',id);
  if(error){
    alert('移除失败：'+error.message+'\n\n请在Supabase SQL编辑器执行以下语句后重试：\nALTER TABLE listings DROP CONSTRAINT IF EXISTS listings_user_id_fkey;\nALTER TABLE orders DROP CONSTRAINT IF EXISTS orders_user_id_fkey;');
    return;
  }
  alert('已成功移除用户 '+name);
  loadUsers();
}
</script>
